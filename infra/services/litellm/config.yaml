# LiteLLM Configuration - CPU-Only Models via Ollama
# Simplified: No GPU inference, only Ollama CPU models

model_list:
  # Fast, lightweight model (CPU) - Free tier
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434

  # Alias for quick access
  - model_name: fast
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434

  # Embeddings model
  - model_name: text-embedding-ada-002
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

  # Alias for embeddings
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434

# General settings
general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: ${DATABASE_URL}

# Enable usage tracking
litellm_settings:
  success_callback: ["langfuse"]
  drop_params: true

# Rate limiting (optional)
router_settings:
  redis_host: null  # No Redis needed for single-server setup
